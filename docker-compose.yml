# ── Shared configuration ─────────────────────────────────────────────────────
x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  volumes:
    - docqa_uploads:/data/uploads
    - docqa_indices:/data/indices
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docqa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-docqa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docqa_user} -d ${POSTGRES_DB:-docqa}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Database migrations (runs once then exits) ──────────────────────────────
  migrate:
    <<: *app-base
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── FastAPI application ──────────────────────────────────────────────────────
  api:
    <<: *app-base
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --log-level info
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery worker ────────────────────────────────────────────────────────────
  worker:
    <<: *app-base
    command: >
      celery -A app.workers.celery_app.celery_app worker
        --loglevel=info
        --concurrency=2
        --queues=celery
        --hostname=worker@%h
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Flower (task monitoring dashboard) ─────────────────────────────
  flower:
    <<: *app-base
    command: >
      celery -A app.workers.celery_app.celery_app flower
        --port=5555
        --broker_api=${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "5555:5555"
    depends_on:
      - worker

volumes:
  postgres_data:
  docqa_uploads:
  docqa_indices:
